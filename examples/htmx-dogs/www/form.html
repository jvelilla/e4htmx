<form id="dog-form" hx-disabled-elt="#submit-btn" 
      {{if is_editing}}
      hx-put="/dog/{selected_id}"
      {{else}}
      hx-post="/dog" hx-target="tbody" hx-swap="afterbegin"
      {{end}}
      hx-on:htmx:after-request="this.reset()">
  
  <div class="form-group">
    <label for="name">Name</label>
    <div class="input-wrapper">
      <input
        id="name"
        name="name"
        required
        placeholder="e.g. Comet"
        type="text"
        value="{name}"
      />
    </div>
  </div>

  <div class="form-group">
    <label for="breed">Breed</label>
    <div class="input-wrapper">
      <input
        id="breed"
        name="breed"
        required
        placeholder="e.g. Whippet"
        type="text"
        value="{breed}"
      />
    </div>
  </div>

  <div class="form-actions">
    <button id="submit-btn" class="btn btn-primary">
      {{if is_editing}}
      Update Profile
      {{else}}
      Register Dog
      {{end}}
    </button>
    {{if is_editing}}
    <button hx-put="/deselect" hx-swap="none" type="button" class="btn btn-secondary">
      Cancel
    </button>
    {{end}}
  </div>
</form>
