<table id="pokemon-table">
  <thead>
    <tr>
      <th style="width: 100px;">ID</th>
      <th>Species Name</th>
      <th style="width: 150px; text-align: center;">Avatar</th>
    </tr>
  </thead>
  <tbody>
    {{each pokemon in pokemon_list}}
    <tr>
      <td><span class="user-id-badge">#{pokemon.id}</span></td>
      <td><span class="user-name">{pokemon.name}</span></td>
      <td style="text-align: center;">
        <img class="pokemon-sprite" alt="{pokemon.name}" src="{pokemon.image_url}" />
      </td>
    </tr>
    {{end}}
  </tbody>
</table>

<span
  id="pagination-buttons"
  hx-swap-oob="true"
  hx-swap="outerHTML"
  hx-indicator=".htmx-indicator"
  hx-target="#pokemon-table"
>
  <button class="btn btn-nav" {{if is_first_page}}disabled{{else}}hx-get="/pokemon-rows?page={prev_page}"{{end}}>
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
    Previous
  </button>
  <div class="page-badge">Page {page}</div>
  <button class="btn btn-nav" hx-get="/pokemon-rows?page={next_page}">
    Next
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
  </button>
</span>
